services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-servermanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-servermanager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # DB only accessible from other containers, not externally
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-servermanager}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-servermanager}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-servermanager}
      POSTGRES_USER: ${POSTGRES_USER:-servermanager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-servermanager}
      PGHOST: db
      SECRET_KEY: ${SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_EXPIRE_MINUTES: 30
      JWT_REFRESH_EXPIRE_DAYS: 7
      PUBLIC_API_URL: ${PUBLIC_API_URL:-https://sshcontrol.com}
      ENABLE_SSH_SYNC: ${ENABLE_SSH_SYNC:-false}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-noreply@sshcontrol.com}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-SSHCONTROL}
      FRONTEND_URL: ${FRONTEND_URL:-https://sshcontrol.com}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      SMPP_PROXY: ${SMPP_PROXY:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app  # DEV ONLY: live-reload code mount; remove for production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # Optional: Nginx Proxy Manager for SSL (sshcontrol.com) and port 80/443.
  # See docs/SSL-SETUP.md for setup. Start with: docker compose up -d nginx-proxy-manager
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    depends_on:
      - frontend

volumes:
  postgres_data:
  npm_data:
  npm_letsencrypt:
