server {
    listen 3000;
    server_name sshcontrol.com www.sshcontrol.com localhost _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API requests to the backend
    # Do NOT set X-Real-IP to $remote_addr - that would overwrite NPM's value with Docker IP (172.18.x).
    # Let X-Real-IP and X-Forwarded-For from NPM pass through; we only append to X-Forwarded-For.
    # Extended timeouts for /api/admin/backup/import (database restore can take several minutes)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Health check passthrough
    location /health {
        proxy_pass http://backend:8000;
    }

    # Root-level static files (poster.jpg, og-image.png, favicon, etc.) – served before SPA fallback
    location ~* ^/.+\.(jpg|jpeg|png|gif|ico|webp|svg)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: serve index.html for all other routes
    # Never cache HTML so users get latest app after deploy
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
